name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libmupdf-dev \
            libmujs-dev \
            libgumbo-dev \
            libopenjp2-7-dev \
            libjbig2dec-dev \
            libjpeg-dev \
            zlib1g-dev \
            libharfbuzz-dev \
            libfreetype-dev \
            libbz2-dev \
            libpng-dev \
            libbrotli-dev

      - name: Install Zig
        run: |
          wget -q https://ziglang.org/builds/zig-linux-x86_64-0.17.0-dev.269+ebff43698.tar.xz
          tar -xf zig-linux-x86_64-0.17.0-dev.269+ebff43698.tar.xz
          echo "$PWD/zig-linux-x86_64-0.17.0-dev.269+ebff43698" >> "$GITHUB_PATH"

      - name: Run tests
        run: zig build test -Doptimize=ReleaseSmall

      - name: Build binary
        run: zig build -Doptimize=ReleaseSmall

      - name: Verify binary
        run: |
          ldd zig-out/bin/pdffigures2 2>&1 || true
          ls -lh zig-out/bin/pdffigures2

      - uses: actions/upload-artifact@v4
        with:
          name: pdffigures2-linux-x86_64
          path: zig-out/bin/pdffigures2

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pdffigures2-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pdffigures2
          generate_release_notes: true